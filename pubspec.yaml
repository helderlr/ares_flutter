name: ares_flutter

description: Aplicativo Flutter para gerenciamento de agendamentos de cirurgias.

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=2.17.0 <4.0.0'
  flutter: '>=3.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.2
  flutter_riverpod: ^2.4.0
  auto_route: ^7.8.4
  http: ^1.1.0
  shared_preferences: ^2.2.2
  image_picker: ^1.0.8
  path_provider: ^2.1.1
  encrypt: ^5.0.3
  google_maps_flutter: ^2.5.3
  url_launcher: ^6.2.4
  geocoding: ^2.1.1
  geolocator: ^11.0.0
  device_info_plus: ^9.1.2
  package_info_plus: ^5.0.1
  fl_chart: ^0.68.0
  share_plus: ^7.2.2
  pdf: ^3.10.8
  printing: ^5.12.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  auto_route_generator: ^7.3.1
  build_runner: ^2.4.6
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/images/logo_domina.png
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: assets/images/logo_domina.png

flutter:
  uses-material-design: true

  assets:
    - assets/images/logo_domina.png
    - assets/images/default_user_avatar.png